name: Commit validation

on: [push, pull_request]

permissions:
  contents: read

jobs:
  commitlint:
    # Ignore dependabot commits
    if: ${{ (github.actor != 'dependabot[bot]') && (contains(github.head_ref, 'dependabot/github_actions/') == false) }}

    strategy:
      matrix:
        os: [ubuntu-latest]
        node: [lts/*]

    runs-on: ${{ matrix.os }}

    concurrency:
      group: lint-${{ matrix.os }}-v${{ matrix.node }}-${{ github.ref }}
      cancel-in-progress: true

    timeout-minutes: 5

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: 🚧 Setup
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: ${{ matrix.node }}
          cache: true
          run-install: false

      - name: 📦 Install dependencies
        run: vp install -w --frozen-lockfile --ignore-scripts

      - name: 📝 Validate current commit (last commit) with commitlint
        if: github.event_name == 'push'
        run: vpx commitlint --last --verbose

      - name: 📝 Validate PR commits with commitlint
        if: github.event_name == 'pull_request'
        run: vpx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose
