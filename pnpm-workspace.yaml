packages:
  - apps/*
  - layers/*
  - packages/*
  - tools/*

catalogMode: prefer
cleanupUnusedCatalogs: true

catalog:
  '@types/node': ^24.13.2
  consola: ^3.4.2
  slug: ^11.0.1
  tailwindcss: ^4.3.1
  typescript: ^6.0.3
  vite: npm:@voidzero-dev/vite-plus-core@0.2.1
  vite-plus: ^0.2.1
  zod: ^4.4.3

catalogs:
  vue:
    pinia: ^3.0.4
    vue: ^3.5.38
    vue-router: ^5.1.0
    vue-tsc: ^3.3.5

  nuxt:
    '@comark/nuxt': ^0.4.0
    '@iconify-json/lucide': ^1.2.113
    '@iconify-json/simple-icons': ^1.2.85
    '@nuxt/a11y': ^1.0.0-alpha.1
    '@nuxt/hints': ^1.1.3
    '@nuxt/image': ^2.0.0
    '@nuxt/ui': ^4.9.0
    '@nuxtjs/i18n': ^10.4.0
    '@nuxtjs/robots': ^6.1.1
    '@pinia/nuxt': ^0.11.3
    '@vueuse/nuxt': ^14.3.0
    nuxt: ^4.4.8
    nuxt-auth-utils: ^0.5.29
    nuxt-security: ^2.6.0

  testing:
    '@nuxt/test-utils': ^4.0.3
    '@vue/test-utils': ^2.4.11
    happy-dom: ^20.10.6
    playwright-core: ^1.61.0
    vitest: ^4.1.9

  tooling:
    stylelint: ^17.13.0
    stylelint-config-standard: ^40.0.0
    stylelint-config-standard-vue: ^1.0.0

overrides:
  vite: 'catalog:'
  vitest: 'catalog:testing'

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'

allowBuilds:
  '@parcel/watcher': false
  '@tailwindcss/oxide': false
  esbuild: false
  sharp: true
  unrs-resolver: false
  vue-demi: false

minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - vite-plus
  - '@voidzero-dev/*'
